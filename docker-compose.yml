services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conflict_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./infra/policies.sql:/docker-entrypoint-initdb.d/002-policies.sql:ro

volumes:
  postgres_data:
